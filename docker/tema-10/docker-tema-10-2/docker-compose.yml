services:
  cass1:
    image: cassandra:4.0
    container_name: cass1
    environment:
      - CASSANDRA_CLUSTER_NAME=backend
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cass1
    ports:
      - "9042:9042"
    volumes:
      - cass1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 60

  cass2:
    image: cassandra:4.0
    container_name: cass2
    depends_on:
      cass1:
        condition: service_healthy
    environment:
      - CASSANDRA_CLUSTER_NAME=backend
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cass1
    volumes:
      - cass2_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 60

  cass3:
    image: cassandra:4.0
    container_name: cass3
    depends_on:
      cass2:
        condition: service_healthy
    environment:
      - CASSANDRA_CLUSTER_NAME=backend
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cass1
    volumes:
      - cass3_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 60

  # Carga de esquema + ~1000 registros (se ejecuta una vez)
  init:
    image: cassandra:4.0
    container_name: cass_init
    depends_on:
      cass1:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/init.sh"]
    restart: "no"

  stargate:
    image: stargateio/stargate-4_0:v1.0.57
    container_name: stargate
    depends_on:
      cass1: { condition: service_healthy }
      cass2: { condition: service_healthy }
      cass3: { condition: service_healthy }
    environment:
      - CLUSTER_NAME=backend
      - CLUSTER_VERSION=4.0
      - SEED=cass1
      - DATACENTER_NAME=dc1
      - RACK_NAME=rack1
      - JAVA_OPTS=-Xms512M -Xmx512M
    ports:
      - "8081:8081"   # Auth (token)
      - "8082:8082"   # REST + Swagger UI

volumes:
  cass1_data:
  cass2_data:
  cass3_data:
