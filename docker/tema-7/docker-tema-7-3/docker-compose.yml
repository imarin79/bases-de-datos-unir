services:
  # -------------------------
  # Config Server RS (1 nodo)
  # -------------------------
  cfg1:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: cfg1
    command: ["mongod","--configsvr","--replSet","cfgRS","--port","27019","--bind_ip_all"]
    volumes:
      - cfg1_data:/data/db
    networks: [mongo-net]
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --port 27019 --eval 'db.adminCommand({ping:1}).ok' | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 60

  # -------------------------
  # Init cfgRS (one-shot)
  # -------------------------
  init_cfg:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: init_cfg
    depends_on:
      cfg1:
        condition: service_healthy
    networks: [mongo-net]
    restart: "no"
    entrypoint: ["/bin/bash","-lc"]
    command: >
      '
      echo "==> init_cfg: cfg1 healthy. Iniciando cfgRS si hace falta...";
      mongosh "mongodb://cfg1:27019/admin" --quiet --eval "
        function sleep(ms){ const t=Date.now()+ms; while(Date.now()<t){} }
        try { rs.status(); print(\"cfgRS ya estaba iniciado\"); }
        catch(e) {
          rs.initiate({ _id: \"cfgRS\", configsvr: true, members: [{ _id: 0, host: \"cfg1:27019\" }] });
          print(\"cfgRS iniciado\");
        }
        // Esperar PRIMARY
        let ok=false;
        for (let i=0;i<180;i++){
          try { if (rs.status().myState === 1) { ok=true; break; } } catch(e) {}
          sleep(1000);
        }
        if(!ok) throw new Error(\"cfgRS no alcanzó PRIMARY\");
        print(\"cfgRS PRIMARY OK\");
      ";
      '

  # -------------------------
  # Shard 1 RS (3 data nodes)
  # -------------------------
  s1a:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s1a
    command: ["mongod","--shardsvr","--replSet","rsShard1","--port","27018","--bind_ip_all"]
    volumes: [ "s1a_data:/data/db" ]
    networks: [mongo-net]

  s1b:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s1b
    command: ["mongod","--shardsvr","--replSet","rsShard1","--port","27018","--bind_ip_all"]
    volumes: [ "s1b_data:/data/db" ]
    networks: [mongo-net]

  s1c:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s1c
    command: ["mongod","--shardsvr","--replSet","rsShard1","--port","27018","--bind_ip_all"]
    volumes: [ "s1c_data:/data/db" ]
    networks: [mongo-net]

  # -------------------------
  # Shard 2 RS (3 data nodes)
  # -------------------------
  s2a:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s2a
    command: ["mongod","--shardsvr","--replSet","rsShard2","--port","27018","--bind_ip_all"]
    volumes: [ "s2a_data:/data/db" ]
    networks: [mongo-net]

  s2b:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s2b
    command: ["mongod","--shardsvr","--replSet","rsShard2","--port","27018","--bind_ip_all"]
    volumes: [ "s2b_data:/data/db" ]
    networks: [mongo-net]

  s2c:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s2c
    command: ["mongod","--shardsvr","--replSet","rsShard2","--port","27018","--bind_ip_all"]
    volumes: [ "s2c_data:/data/db" ]
    networks: [mongo-net]

  # -------------------------
  # Shard 3 RS (3 data nodes)
  # -------------------------
  s3a:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s3a
    command: ["mongod","--shardsvr","--replSet","rsShard3","--port","27018","--bind_ip_all"]
    volumes: [ "s3a_data:/data/db" ]
    networks: [mongo-net]

  s3b:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s3b
    command: ["mongod","--shardsvr","--replSet","rsShard3","--port","27018","--bind_ip_all"]
    volumes: [ "s3b_data:/data/db" ]
    networks: [mongo-net]

  s3c:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: s3c
    command: ["mongod","--shardsvr","--replSet","rsShard3","--port","27018","--bind_ip_all"]
    volumes: [ "s3c_data:/data/db" ]
    networks: [mongo-net]

  # -------------------------
  # mongos (router) - arranca SOLO tras init_cfg OK
  # -------------------------
  mongos:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: mongos
    depends_on:
      init_cfg:
        condition: service_completed_successfully
    volumes:
      - ./setup/mongos-entrypoint.sh:/usr/local/bin/mongos-entrypoint.sh:ro
    entrypoint: ["/bin/bash","/usr/local/bin/mongos-entrypoint.sh"]
    ports:
      - "127.0.0.1:27017:27017"
    networks: [mongo-net]
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017/admin --eval 'db.adminCommand({ping:1}).ok' | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  # -------------------------
  # setup (one-shot): shards + sharding + seed
  # -------------------------
  setup:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: setup
    depends_on:
      mongos:
        condition: service_started
      s1a:
        condition: service_started
      s2a:
        condition: service_started
      s3a:
        condition: service_started
    volumes:
      - ./setup:/setup:ro
    entrypoint: ["/bin/bash","/setup/setup.sh"]
    networks: [mongo-net]
    restart: "no"

  # ==========================================================
  # MONITOREO: Exporter + Prometheus + Grafana
  # ==========================================================

  mongodb_exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb_exporter
    depends_on:
      mongos:
        condition: service_healthy
    networks: [mongo-net]
    ports:
      - "9216:9216"
    command:
      - "--web.listen-address=:9216"
      - "--web.telemetry-path=/metrics"
      - "--compatible-mode"
      - "--collect-all"
      - "--mongodb.uri=mongodb://mongos:27017/admin,mongodb://cfg1:27019/admin,mongodb://s1a:27018/admin,mongodb://s1b:27018/admin,mongodb://s1c:27018/admin,mongodb://s2a:27018/admin,mongodb://s2b:27018/admin,mongodb://s2c:27018/admin,mongodb://s3a:27018/admin,mongodb://s3b:27018/admin,mongodb://s3c:27018/admin"


  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    depends_on:
      - mongodb_exporter
    networks:
      mongo-net: {}
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    depends_on:
      - prometheus
    networks: [mongo-net]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin.
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

networks:
  mongo-net:

volumes:
  cfg1_data:
  s1a_data:
  s1b_data:
  s1c_data:
  s2a_data:
  s2b_data:
  s2c_data:
  s3a_data:
  s3b_data:
  s3c_data:
  prometheus_data:
  grafana_data: