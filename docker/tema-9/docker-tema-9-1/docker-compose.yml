services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_social_network_demo
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/neo4j12345"
      NEO4J_dbms_security_allow__csv__import__from__file__urls: "true"
      NEO4J_server_directories_import: "/data_files"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/csv:/data_files:ro
      - ./neo4j/conf:/conf
volumes:
  neo4j_data:
  neo4j_logs:
